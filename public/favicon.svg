<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <style>
    @keyframes pulse {
      0%, 100% { fill: #cbb26a; }
      50% { fill: #e8d48e; }
    }
    rect { animation: pulse 2s ease-in-out infinite; }
  </style>
  <rect width="512" height="512" fill="#cbb26a"/>
</svg>
